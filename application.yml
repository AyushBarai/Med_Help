# =====================================================================
#  PathLab SaaS - Application Configuration
#  This file is the single source of truth for all app settings.
#  For production, override these via environment variables.
# =====================================================================

spring:
  application:
    name: pathlab-saas

  # ----- DATABASE -----
  datasource:
    url: jdbc:postgresql://localhost:5432/pathlab_db
    username: pathlab_user
    password: pathlab_pass
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10     # max DB connections in pool
      minimum-idle: 2
      connection-timeout: 30000

  # ----- JPA / HIBERNATE -----
  jpa:
    hibernate:
      ddl-auto: validate        # IMPORTANT: Flyway handles schema, Hibernate only validates
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_batch_fetch_size: 20

  # ----- FLYWAY (DB migrations) -----
  # On startup, Flyway runs any new SQL files in db/migration in order.
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  # ----- REDIS -----
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 3000ms

  # ----- FILE UPLOAD LIMIT -----
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 10MB

# =====================================================================
#  Custom app properties — accessed via @Value or @ConfigurationProperties
# =====================================================================
app:

  jwt:
    # Change this secret in production! Must be at least 32 characters.
    secret: "pathlab-super-secret-key-change-this-before-going-live-2024"
    expiry-hours: 24
    refresh-expiry-days: 30

  otp:
    length: 6
    ttl-minutes: 5
    max-attempts: 3

  aws:
    region: ap-south-1
    s3:
      bucket: pathlab-reports-dev
      # For local dev we'll skip actual S3 and store locally
      use-local-storage: true
      local-storage-path: ./uploads

  base-url: http://localhost:8080
  patient-portal-url: http://localhost:3001

# =====================================================================
#  Swagger UI — accessible at http://localhost:8080/swagger-ui/index.html
# =====================================================================
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui
    operations-sorter: method

# =====================================================================
#  Logging
# =====================================================================
logging:
  level:
    com.pathlab: DEBUG
    org.hibernate.SQL: DEBUG
    org.flywaydb: INFO